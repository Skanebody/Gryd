# GRYD — build Android preview/internal (O8).
# Déclenchement manuel : Actions → Preview Android → Run workflow.
#
# Secrets requis :
#   EXPO_TOKEN — https://expo.dev/accounts/[account]/settings/access-tokens
name: Preview Android

on:
  workflow_dispatch:
    inputs:
      profile:
        description: 'Profil EAS'
        required: true
        default: preview
        type: choice
        options:
          - preview
          - development

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 90
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: EAS Build Android
        env:
          EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}
        working-directory: apps/mobile
        run: |
          npx eas-cli@latest build \
            --platform android \
            --profile "${{ inputs.profile }}" \
            --non-interactive \
            --no-wait
